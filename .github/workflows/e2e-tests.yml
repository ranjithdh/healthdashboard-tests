name: E2E Tests - Playwright + Kotlin

on:
  push:
    branches: [main,feature/action_plan,feature/test_profile,testReportSeeni]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_tags:
        description: 'Target area to test'
        required: true
        default: 'All'
        type: choice
        options:
          - All
          - Mobile
          - Website
          - WebView
          - Onboard

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://app.stg.deepholistics.com/
  HEADLESS: true

jobs:
  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_tags == 'All' || github.event.inputs.test_tags == 'Mobile'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Playwright browsers
        run: npx playwright@1.49.0 install --with-deps chromium webkit

      - name: Install Playwright dependencies
        run: npx playwright@1.49.0 install-deps

      - name: Run mobile tests
        run: |
          ./gradlew mobileTests \
          -Djunit.jupiter.execution.parallel.config.strategy=fixed \
          -Djunit.jupiter.execution.parallel.config.fixed.parallelism=2
        env:
          HEADLESS: true

      - name: Generate Allure report
        if: always()
        run: ./gradlew allure3Report -Penvironment=Mobile

      # ✅ DEBUG STEP (VERY IMPORTANT)
      - name: Debug Allure files
        if: always()
        run: |
          echo "---- ALLURE RESULTS ----"
          ls -R build/allure-results || echo "No allure-results"

          echo "---- ALLURE REPORT ----"
          ls -R build/allure-report-v3 || echo "No allure-report"

      # ✅ FIXED UPLOAD (CRITICAL)
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results
          path: |
            build/allure-report-v3/**
            build/allure-results/**
            build/screenshots/**
          retention-days: 30

  test-webview:
    name: WebView Tests
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_tags == 'All' || github.event.inputs.test_tags == 'WebView'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - run: npx playwright@1.49.0 install --with-deps chromium
      - run: npx playwright@1.49.0 install-deps

      - name: Run WebView tests
        run: ./gradlew webViewTests

      - name: Generate Allure report
        if: always()
        run: ./gradlew allure3Report -Penvironment=WebView

      - name: Debug Allure files
        if: always()
        run: |
          ls -R build/allure-results || echo "No allure-results"
          ls -R build/allure-report-v3 || echo "No allure-report"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: webview-test-results
          path: |
            build/allure-report-v3/**
            build/allure-results/**
          retention-days: 30

  test-onboard:
    name: Onboard Tests
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_tags == 'All' || github.event.inputs.test_tags == 'Onboard'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - run: npx playwright@1.49.0 install --with-deps chromium
      - run: npx playwright@1.49.0 install-deps

      - name: Run onboard tests
        run: ./gradlew onboardTests
        env:
          HEADLESS: true

      - name: Generate Allure report
        if: always()
        run: ./gradlew allure3Report -Penvironment=Onboard

      - name: Debug Allure files
        if: always()
        run: |
          ls -R build/allure-results || echo "No allure-results"
          ls -R build/allure-report-v3 || echo "No allure-report"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: onboard-test-results
          path: |
            build/allure-report-v3/**
            build/allure-results/**
          retention-days: 30
